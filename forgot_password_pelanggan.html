<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lupa Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#C8D9A8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
    color:#4A5D23;
    margin-bottom:10px;
}

p{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #D4E4B5;
    border-radius:10px;
    margin-bottom:20px;
    font-family:'Poppins';
}

button{
    width:100%;
    padding:12px;
    background:#6B8E3B;
    color:white;
    border:none;
    border-radius:10px;
    font-family:'Poppins';
    cursor:pointer;
}

button:hover{
    background:#5a7a32;
}

</style>
</head>

<body>

<div class="box">

<h2>Lupa Password</h2>

<p>Masukkan email akun anda</p>

<input type="email" id="email" placeholder="nama@gmail.com">

<button onclick="sendReset()">Kirim Link Reset</button>

</div>

<script>

function sendReset(){

    const email = document.getElementById('email').value;

    fetch('http://127.0.0.1:8000/api/forgot-password',{

        method:'POST',

        headers:{
            'Content-Type':'application/json',
            'Accept':'application/json'
        },

        body:JSON.stringify({
            email:email
        })

    })

    .then(async response=>{

        const data = await response.json();

        if(response.ok){

            alert(data.message);

        }else{

            alert(data.message);

        }

    })

    .catch(error=>{

        console.log(error);
        alert('Tidak bisa connect ke backend');

    });

}

</script>

</body>
</html>
