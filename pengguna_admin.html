<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanenKu - Kelola Pengguna</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #c5e1a5; min-height: 100vh; color: #333; }

        /* ===== HEADER ===== */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: #fff; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { 
            width: 40px; 
            height: 40px; 
            border-radius: 10px; 
            background: #e8f5e9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            transition: all 0.2s; 
        }
        .btn-back:hover { background: #c8e6c9; }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 40px; height: 40px; object-fit: contain; }
        .logo-text { font-size: 24px; font-weight: 700; color: #2d5016; }
        
        /* Foto profil (bisa diklik) */
        .profil-img { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            object-fit: cover; 
            cursor: pointer; 
            border: 3px solid #aed581; 
            transition: all 0.2s;
        }
        .profil-img:hover { 
            border-color: #7cb342; 
            transform: scale(1.05); 
        }

        /* ===== TABLE CONTAINER ===== */
        .table-container { padding: 30px 40px; max-width: 1400px; margin: 0 auto; }
        .table-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; gap: 15px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-label { font-size: 14px; color: #555; font-weight: 500; }
        .filter-dropdown { padding: 10px 15px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-family: inherit; font-size: 14px; cursor: pointer; min-width: 150px; outline: none; }
        .search-box { display: flex; align-items: center; background: #fff; border-radius: 10px; padding: 10px 15px; border: 1px solid #ddd; min-width: 300px; }
        .search-box input { border: none; outline: none; flex: 1; font-size: 14px; font-family: inherit; margin-left: 10px; color: #333; }
        .search-box input::placeholder { color: #aaa; }

        /* ===== TABLE ===== */
        .data-table { width: 100%; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-collapse: collapse; }
        .data-table th { background: #558b2f; color: white; padding: 15px; text-align: left; font-weight: 500; font-size: 14px; }
        .data-table td { padding: 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: top; }
        .data-table tr:hover { background: #f9f9f9; }
        .table-actions { display: flex; gap: 10px; }
        .role-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; }
        .role-pelanggan { background: #e3f2fd; color: #1565c0; }
        .role-penjual { background: #fff3e0; color: #ef6c00; }
        .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-edit { background: #c8e6c9; color: #2e7d32; }
        .btn-edit:hover { background: #a5d6a7; }
        .btn-delete { background: #ffcdd2; color: #c62828; }
        .btn-delete:hover { background: #ef9a9a; }

        /* ===== PAGINATION ===== */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 25px; }
        .page-btn { padding: 8px 14px; border-radius: 8px; border: none; background: #fff; cursor: pointer; font-family: inherit; font-size: 14px; color: #666; transition: all 0.2s; }
        .page-btn:hover { background: #e8f5e9; color: #2d5016; }
        .page-btn.active { background: #7cb342; color: white; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== MODAL ===== */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; font-weight: 600; color: #2d5016; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #999; line-height: 1; }
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-secondary { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-family: inherit; font-size: 14px; }
        .btn-secondary:hover { background: #f5f5f5; }
        .btn-danger { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #e53935; color: white; font-family: inherit; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-danger:hover { background: #c62828; }
        .btn-primary { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #7cb342; color: white; font-family: inherit; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-primary:hover { background: #689f38; }

        /* ===== FORM ===== */
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; font-weight: 500; }
        .form-input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 14px; outline: none; transition: all 0.2s; }
        .form-input:focus { border-color: #7cb342; }
        .form-input.error { border-color: #e53935; background: #ffebee; }
        .error-text { color: #e53935; font-size: 12px; margin-top: 6px; display: none; }
        .error-text.show { display: block; }
        .form-select { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 14px; outline: none; background: #fff; cursor: pointer; }

        /* ===== TOAST ===== */
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 14px 24px; border-radius: 12px; color: white; font-size: 14px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 400px; }
        .toast.success { background: #43a047; }
        .toast.error { background: #e53935; }

        /* ===== FOOTER ===== */
        .footer { text-align: center; padding: 30px; color: #555; font-size: 14px; }

        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .table-container { padding: 20px; }
            .table-header { flex-direction: column; align-items: stretch; }
            .search-box { min-width: auto; }
            .data-table { font-size: 12px; }
            .data-table th, .data-table td { padding: 10px; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-left">
            <a href="profil_admin.html" class="btn-back" title="Kembali ke Profil Admin">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2d5016" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <div class="logo-container">
                <img src="logo.png" alt="PanenKu" class="logo-img">
                <span class="logo-text">PanenKu</span>
            </div>
        </div>
        <a href="profil_admin.html" title="Ke Profil Admin">
            <img src="profil.png" alt="Profil" class="profil-img">
        </a>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        <div class="table-container">
            <div class="table-header">
                <div class="filter-group">
                    <label class="filter-label">Kategori</label>
                    <select class="filter-dropdown" id="filterPeran" onchange="changePage(1)">
                        <option value="Semua">Semua</option>
                        <option value="Pelanggan">Pelanggan</option>
                        <option value="Penjual">Penjual</option>
                    </select>
                </div>
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" placeholder="Cari" oninput="changePage(1)">
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:50px">No</th>
                        <th>Peran</th>
                        <th>Nama</th>
                        <th>Email</th>
                        <th>Alamat</th>
                        <th style="width:100px">Aksi</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>

            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <footer class="footer">© 2026 Panenku. All rights reserved.</footer>

    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== MODAL EDIT ===== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">✏️ Edit Pengguna</h3>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">Nama</label>
                <input type="text" class="form-input" id="editNama">
                <div class="error-text" id="errorNama">Nama wajib diisi</div>
            </div>
            <div class="form-group">
                <label class="form-label">Peran</label>
                <select class="form-select" id="editPeran">
                    <option value="Pelanggan">Pelanggan</option>
                    <option value="Penjual">Penjual</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="editEmail">
                <div class="error-text" id="errorEmail">Email tidak valid</div>
            </div>
            <div class="form-group">
                <label class="form-label">Alamat</label>
                <textarea class="form-input" id="editAlamat" rows="3"></textarea>
                <div class="error-text" id="errorAlamat">Alamat wajib diisi</div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeEditModal()">Batal</button>
                <button class="btn-primary" onclick="submitEdit()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL DELETE ===== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">🗑️ Konfirmasi Hapus</h3>
                <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
            </div>
            <p style="color: #666; font-size: 14px; line-height: 1.6;">
                Apakah Anda yakin ingin menghapus pengguna <strong id="deleteUserName"></strong>?<br><br>
                <span style="color: #e53935;">Data pengguna ini akan dihapus secara permanen.</span>
            </p>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeDeleteModal()">Batal</button>
                <button class="btn-danger" onclick="confirmDelete()">Hapus Permanen</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        let users = [
            { id: 1, peran: 'Pelanggan', nama: 'Vivi', email: 'vivi@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
            { id: 2, peran: 'Penjual', nama: 'ViviGroceries', email: 'viviinasrara@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
            { id: 3, peran: 'Penjual', nama: 'RaraFarmers', email: 'viviinasrara@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
            { id: 4, peran: 'Pelanggan', nama: 'Inas', email: 'inas@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
            { id: 5, peran: 'Pelanggan', nama: 'Rara', email: 'rara@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
            { id: 6, peran: 'Penjual', nama: 'BudiFarm', email: 'budi@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
            { id: 7, peran: 'Pelanggan', nama: 'Ani', email: 'ani@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
            { id: 8, peran: 'Penjual', nama: 'CitraSayur', email: 'citra@gmail.com', alamat: 'Jl. Raya Sutorejo No.123, RT. 01/RW 05. Dusun Sutorejo, Kec. Mulyorejo, Surabaya, Jawa Timur, 64211' },
        ];

        let currentPage = 1;
        let itemsPerPage = 5;
        let currentEditId = null;
        let currentDeleteId = null;

        // ==================== ICONS ====================
        const icons = {
            edit: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>',
            trash: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>',
            check: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
            alert: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>'
        };

        // ==================== TOAST ====================
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = icons[type === 'success' ? 'check' : 'alert'] + '<span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        // ==================== RENDER ====================
        function getFilteredUsers() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var filter = document.getElementById('filterPeran').value;
            
            return users.filter(function(u) {
                var matchSearch = u.nama.toLowerCase().includes(search) || u.email.toLowerCase().includes(search);
                var matchRole = filter === 'Semua' || u.peran === filter;
                return matchSearch && matchRole;
            });
        }

        function renderTable() {
            var filtered = getFilteredUsers();
            var totalPages = Math.ceil(filtered.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            var start = (currentPage - 1) * itemsPerPage;
            var paginated = filtered.slice(start, start + itemsPerPage);
            
            var tbody = document.getElementById('usersTableBody');
            var html = '';
            
            for (var i = 0; i < paginated.length; i++) {
                var u = paginated[i];
                var no = start + i + 1;
                var roleClass = u.peran === 'Pelanggan' ? 'role-pelanggan' : 'role-penjual';
                
                html += '<tr>';
                html += '<td>' + no + '</td>';
                html += '<td><span class="role-badge ' + roleClass + '">' + u.peran + '</span></td>';
                html += '<td>' + u.nama + '</td>';
                html += '<td>' + u.email + '</td>';
                html += '<td style="max-width:300px; font-size:13px; line-height:1.5">' + u.alamat + '</td>';
                html += '<td>';
                html += '<div class="table-actions">';
                html += '<button class="btn-icon btn-edit" onclick="openEditModal(' + u.id + ')" title="Edit">' + icons.edit + '</button>';
                html += '<button class="btn-icon btn-delete" onclick="openDeleteModal(' + u.id + ')" title="Hapus">' + icons.trash + '</button>';
                html += '</div>';
                html += '</td>';
                html += '</tr>';
            }
            
            if (paginated.length === 0) {
                html = '<tr><td colspan="6" style="text-align:center; padding:40px; color:#888">Tidak ada pengguna yang ditemukan</td></tr>';
            }
            
            tbody.innerHTML = html;
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            var html = '';
            
            html += '<button class="page-btn" onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>&larr; Previous</button>';
            
            for (var i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += '<button class="page-btn ' + (i === currentPage ? 'active' : '') + '" onclick="changePage(' + i + ')">' + i + '</button>';
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += '<span style="color:#888">...</span>';
                }
            }
            
            html += '<button class="page-btn" onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages || totalPages === 0 ? 'disabled' : '') + '>Next &rarr;</button>';
            
            document.getElementById('pagination').innerHTML = totalPages > 1 ? html : '';
        }

        function changePage(page) {
            currentPage = page;
            renderTable();
        }

        // ==================== EDIT MODAL ====================
        function openEditModal(id) {
            currentEditId = id;
            var user = null;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === id) {
                    user = users[i];
                    break;
                }
            }
            
            document.getElementById('editNama').value = user.nama;
            document.getElementById('editPeran').value = user.peran;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editAlamat').value = user.alamat;
            
            document.getElementById('errorNama').classList.remove('show');
            document.getElementById('errorEmail').classList.remove('show');
            document.getElementById('errorAlamat').classList.remove('show');
            document.getElementById('editNama').classList.remove('error');
            document.getElementById('editEmail').classList.remove('error');
            document.getElementById('editAlamat').classList.remove('error');
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            currentEditId = null;
        }

        function submitEdit() {
            var nama = document.getElementById('editNama').value.trim();
            var peran = document.getElementById('editPeran').value;
            var email = document.getElementById('editEmail').value.trim();
            var alamat = document.getElementById('editAlamat').value.trim();
            
            var valid = true;
            
            if (!nama) {
                document.getElementById('errorNama').classList.add('show');
                document.getElementById('editNama').classList.add('error');
                valid = false;
            } else {
                document.getElementById('errorNama').classList.remove('show');
                document.getElementById('editNama').classList.remove('error');
            }
            
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('errorEmail').classList.add('show');
                document.getElementById('editEmail').classList.add('error');
                valid = false;
            } else {
                document.getElementById('errorEmail').classList.remove('show');
                document.getElementById('editEmail').classList.remove('error');
            }
            
            if (!alamat) {
                document.getElementById('errorAlamat').classList.add('show');
                document.getElementById('editAlamat').classList.add('error');
                valid = false;
            } else {
                document.getElementById('errorAlamat').classList.remove('show');
                document.getElementById('editAlamat').classList.remove('error');
            }
            
            if (!valid) return;
            
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === currentEditId) {
                    users[i].nama = nama;
                    users[i].peran = peran;
                    users[i].email = email;
                    users[i].alamat = alamat;
                    break;
                }
            }
            
            saveData();
            renderTable();
            closeEditModal();
            showToast('Pengguna "' + nama + '" berhasil diperbarui!', 'success');
        }

        // ==================== DELETE MODAL ====================
        function openDeleteModal(id) {
            currentDeleteId = id;
            var user = null;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === id) {
                    user = users[i];
                    break;
                }
            }
            document.getElementById('deleteUserName').textContent = user ? user.nama : '';
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            currentDeleteId = null;
        }

        function confirmDelete() {
            if (currentDeleteId === null) {
                showToast('Terjadi kesalahan. Coba lagi.', 'error');
                return;
            }
            
            var user = null;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === currentDeleteId) {
                    user = users[i];
                    break;
                }
            }
            
            users = users.filter(function(u) { return u.id !== currentDeleteId; });
            
            saveData();
            renderTable();
            closeDeleteModal();
            showToast('Pengguna "' + (user ? user.nama : '') + '" berhasil dihapus!', 'success');
        }

        // ==================== LOCAL STORAGE ====================
        function saveData() {
            localStorage.setItem('panenku_users', JSON.stringify(users));
        }

        function loadData() {
            var saved = localStorage.getItem('panenku_users');
            if (saved) users = JSON.parse(saved);
        }

        // ==================== INIT ====================
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) closeDeleteModal();
        });

        loadData();
        renderTable();
    </script>
</body>
</html>
