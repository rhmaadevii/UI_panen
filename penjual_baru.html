<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanenKu - Penjual Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] },
                    colors: {
                        hijau: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#A2CA6C', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .love-btn { transition: all 0.3s ease; }
        .love-btn.active { color: #ef4444; transform: scale(1.2); }
        .love-btn.active i { font-weight: 900; }
        .product-card { border: 2px solid #A2CA6C; transition: all 0.3s ease; background: white; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #166534; color: white; padding: 12px 24px; border-radius: 8px;
            opacity: 0; transition: all 0.3s ease; z-index: 1000; font-weight: 500;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .page-bg { background: linear-gradient(135deg, #A2CA6C 0%, #A2CA6C 50%, #A2CA6C 100%); min-height: 100vh; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="page-bg py-8 px-4">
        <!-- Toast -->
        <div id="toast" class="toast">Produk ditambahkan ke favorit!</div>

        <!-- Header -->
        <div class="max-w-7xl mx-auto mb-6">
            <div class="flex items-center justify-between">
                <a href="index.html" class="bg-white/80 hover:bg-white p-3 rounded-full transition shadow-lg">
                    <i class="fas fa-chevron-left text-hijau-800 text-xl"></i>
                </a>
                <div class="bg-yellow-200 px-8 py-2 rounded-lg shadow-lg">
                    <h1 class="text-xl font-bold text-gray-800 tracking-wider">NEW SELLER</h1>
                </div>
                <div class="w-12"></div>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="max-w-7xl mx-auto">
            <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Products will be rendered by JS -->
            </div>
        </div>

        <!-- Scroll Down Indicator -->
        <div class="flex justify-center mt-8">
            <button onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" 
                class="bg-hijau-800/50 hover:bg-hijau-800/70 text-white p-3 rounded-full transition animate-bounce">
                <i class="fas fa-chevron-down text-xl"></i>
            </button>
        </div>
    </div>

    <script>
        const newSellerProducts = [
            { id: 'tomat_ns1', name: 'Tomat', price: 'Rp.9.000', desc: 'Tomat segar dari pertanian', loc: 'Kebomas, Gresik', rating: '4,5', reviews: '20 Ulasan', img: 'tomat1.png' },
            { id: 'tomat_ns2', name: 'Tomat', price: 'Rp.7.000', desc: 'Tomat fresh dari pegunungan', loc: 'Plaosan, Magetan', rating: '4,7', reviews: '157 Ulasan', img: 'tomat2.png' },
            { id: 'tomat_ns3', name: 'Tomat', price: 'Rp.8.000', desc: 'Tomat segar dari ladang', loc: 'Driyorejo, Gresik', rating: '4,6', reviews: '93 Ulasan', img: 'tomat3.png' },
            { id: 'bibit_tomat_ns1', name: 'Bibit Tomat', price: 'Rp.5.000', desc: 'Bibit tomat unggul daerah pegunungan', loc: 'Plaosan, Magetan', rating: '4,9', reviews: '120 Ulasan', img: 'bibit_tomat1.png' },
            { id: 'tomat_ns4', name: 'Tomat', price: 'Rp.7.500', desc: 'Tomat segar dari lahan pertanian', loc: 'Pujon, Malang', rating: '4,7', reviews: '73 Ulasan', img: 'tomat4.png' },
            { id: 'bibit_tomat_ns2', name: 'Bibit Tomat', price: 'Rp.5.500', desc: 'Bibit tomat berkualitas', loc: 'Kebomas, Gresik', rating: '4,4', reviews: '54 Ulasan', img: 'bibit_tomat2.png' },
            { id: 'tomat_ns5', name: 'Tomat', price: 'Rp.9.000', desc: 'Tomat segar, tanpa peptisida', loc: 'Pancasari, Bali', rating: '4,2', reviews: '33 Ulasan', img: 'tomat5.png' },
            { id: 'tomat_ns6', name: 'Tomat', price: 'Rp.6.000', desc: 'Tomat segar yang anda cari !', loc: 'Purwoharjo, Banyuwangi', rating: '4,6', reviews: '99 Ulasan', img: 'tomat6.png' },
            // VARIETY - Non-tomat products mixed in
            { id: 'wortel_ns1', name: 'Wortel', price: 'Rp.4.000', desc: 'Wortel segar manis', loc: 'Batu, Malang', rating: '4,8', reviews: '45 Ulasan', img: 'wortel.png' },
            { id: 'cabai_ns1', name: 'Cabai Merah', price: 'Rp.12.000', desc: 'Cabai merah pedas segar', loc: 'Kediri, Jawa Timur', rating: '4,7', reviews: '67 Ulasan', img: 'cabe.png' },
            { id: 'bawang_ns1', name: 'Bawang Merah', price: 'Rp.15.000', desc: 'Bawang merah asli Brebes', loc: 'Brebes, Jawa Tengah', rating: '4,9', reviews: '89 Ulasan', img: 'https://images.unsplash.com/photo-1618512496248-a07fe83aa8cb?w=300&h=250&fit=crop' },
            { id: 'bayam_ns1', name: 'Bayam Hijau', price: 'Rp.3.000', desc: 'Bayam hijau segar organik', loc: 'Trawas, Mojokerto', rating: '4,6', reviews: '34 Ulasan', img: 'https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=300&h=250&fit=crop' },
            { id: 'kentang_ns1', name: 'Kentang', price: 'Rp.8.000', desc: 'Kentang Dieng kualitas premium', loc: 'Dieng, Wonosobo', rating: '4,8', reviews: '112 Ulasan', img: 'kentang.png' },
            { id: 'terong_ns1', name: 'Terong Ungu', price: 'Rp.5.000', desc: 'Terong ungu segar', loc: 'Magelang, Jawa Tengah', rating: '4,5', reviews: '28 Ulasan', img: 'terong.png' },
            { id: 'sawi_ns1', name: 'Sawi Hijau', price: 'Rp.3.500', desc: 'Sawi hijau segar', loc: 'Bandungan, Semarang', rating: '4,7', reviews: '41 Ulasan', img: 'https://images.unsplash.com/photo-1622205313162-be1d5712a43f?w=300&h=250&fit=crop' },
            { id: 'jagung_ns1', name: 'Jagung Manis', price: 'Rp.6.000', desc: 'Jagung manis super sweet', loc: 'Pacet, Mojokerto', rating: '4,8', reviews: '76 Ulasan', img: 'https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=300&h=250&fit=crop' },
        ];

        function createProductCard(product) {
            return `
                <a href="detail_produk.html?id=${product.id}" class="product-card rounded-xl overflow-hidden block">
                    <div class="p-4">
                        <img src="${product.img}" alt="${product.name}" class="w-full h-44 object-contain mb-3">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="text-lg font-bold text-gray-800">${product.name}</h3>
                            <span class="text-base font-semibold text-gray-800">${product.price}</span>
                        </div>
                        <p class="text-xs text-gray-500 mb-2">${product.desc}</p>
                        <div class="flex items-center text-xs text-gray-500 mb-2">
                            <i class="fas fa-map-marker-alt mr-1 text-hijau-600"></i> ${product.loc}
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center text-xs">
                                <i class="fas fa-star text-yellow-400 mr-1"></i>
                                <span class="font-semibold">${product.rating}</span>
                                <span class="text-gray-400 ml-1">(${product.reviews})</span>
                            </div>
                            <button onclick="event.preventDefault(); toggleLove(this)" class="love-btn text-gray-300 hover:text-red-400 text-lg">
                                <i class="far fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = newSellerProducts.map(p => createProductCard(p)).join('');
        }

        function toggleLove(btn) {
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            if (btn.classList.contains('active')) {
                icon.classList.remove('far');
                icon.classList.add('fas');
                showToast('Produk ditambahkan ke favorit!');
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
                showToast('Produk dihapus dari favorit!');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        renderProducts();
    </script>
</body>
</html>
