        // ============================================
        // CART FUNCTIONALITY - Integrasi dengan keranjang_teman.html
        // ============================================


        let currentQuantity = 1;
        let currentProduct = null;


        // Get product ID from URL
        function getProductId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') || 'tomat1';
        }


        // Load product data
        function loadProduct() {
            const productId = getProductId();
            currentProduct = products[productId] || products['tomat1'];


            document.getElementById('product-name').textContent = currentProduct.fullName;
            document.getElementById('product-short-desc').textContent = currentProduct.shortDesc;
            document.getElementById('product-price').textContent = currentProduct.priceDisplay;
            document.getElementById('product-rating').textContent = currentProduct.rating;
            document.getElementById('product-reviews').textContent = currentProduct.reviews;
            document.getElementById('product-location').textContent = currentProduct.location;
            document.getElementById('product-desc').innerHTML = currentProduct.desc.replace(/\\n/g, '<br><br>');
            document.getElementById('product-closing').textContent = currentProduct.closing;
            document.getElementById('seller-name').textContent = currentProduct.seller;
            document.getElementById('seller-location').textContent = currentProduct.sellerLocation;
            document.getElementById('review-rating').textContent = currentProduct.rating;
            document.getElementById('review-title').textContent = 'Review Produk (' + currentProduct.reviewCount + ')';


            const infoList = document.getElementById('product-info');
            infoList.innerHTML = '';
            currentProduct.info.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = '• ' + item;
                infoList.appendChild(li);
            });


            currentImageIndex = 0;
            updateImage();
            updateCartCount();
        }


        // Quantity controls
        function changeQuantity(delta) {
            const newQty = currentQuantity + delta;
            if (newQty >= 1 && newQty <= currentProduct.stock) {
                currentQuantity = newQty;
                document.getElementById('product-quantity').textContent = currentQuantity;
                // Update price display
                const totalPrice = currentProduct.price * currentQuantity;
                document.getElementById('product-price').textContent = 'Rp. ' + totalPrice.toLocaleString('id-ID');
            } else if (newQty > currentProduct.stock) {
                showToast('Stok hanya tersisa ' + currentProduct.stock + ' item');
            }
        }


        // ============================================
        // CART OPERATIONS - Menyimpan ke localStorage
        // ============================================


        function getCart() {
            const stored = localStorage.getItem('panenku_cart');
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    return [];
                }
            }
            return [];
        }


        function saveCart(cart) {
            localStorage.setItem('panenku_cart', JSON.stringify(cart));
            updateCartCount();
        }


        function updateCartCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cart-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }


        function addToCart() {
            const cart = getCart();


            // Cek apakah produk sudah ada di keranjang
            const existingItem = cart.find(item => item.id === currentProduct.id);


            if (existingItem) {
                // Update quantity jika sudah ada
                existingItem.quantity += currentQuantity;
                showToast(currentProduct.name + ' ditambahkan (' + existingItem.quantity + ' item di keranjang)');
            } else {
                // Tambah item baru
                const newItem = {
                    id: currentProduct.id,
                    shopId: 'shop_' + currentProduct.seller.toLowerCase().replace(/\s/g, ''),
                    shopName: currentProduct.seller,
                    name: currentProduct.fullName,
                    image: currentProduct.images[0],
                    variant: 'Default',
                    variants: ['Default'],
                    price: currentProduct.price,
                    stock: currentProduct.stock,
                    quantity: currentQuantity,
                    tier: null,
                    selected: false,
                    editing: false
                };
                cart.push(newItem);
                showToast(currentProduct.name + ' ditambahkan ke keranjang!');
            }


            saveCart(cart);
        }


        function buyNow() {
            // Langsung tambah ke keranjang dan redirect ke keranjang
            addToCart();
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 800);
        }


        // ============================================
        // CAROUSEL
        // ============================================


        let currentImageIndex = 0;


        function updateImage() {
            const img = document.getElementById('main-image');
            img.src = currentProduct.images[currentImageIndex];
            document.getElementById('current-img').textContent = currentImageIndex + 1;
        }


        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % currentProduct.images.length;
            updateImage();
        }


        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + currentProduct.images.length) % currentProduct.images.length;
            updateImage();
        }


        // ============================================
        // LOVE BUTTON
        // ============================================


        function toggleLove(btn) {
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            if (btn.classList.contains('active')) {
                icon.classList.remove('far');
                icon.classList.add('fas');
                showToast('Produk ditambahkan ke favorit!');
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
                showToast('Produk dihapus dari favorit!');
            }
        }


        // ============================================
        // TOAST & UTILITIES
        // ============================================


        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }


        function openChat() {
            // Kirim data produk ke chat_detail.html dengan penjual
            const chatUrl = 'chat_detail.html?seller=' + encodeURIComponent(currentProduct.seller)
                + '&avatar=' + encodeURIComponent('profil.png')
                + '&productId=' + encodeURIComponent(currentProduct.id)
                + '&productName=' + encodeURIComponent(currentProduct.fullName)
                + '&productPrice=' + encodeURIComponent(currentProduct.priceDisplay)
                + '&productImage=' + encodeURIComponent(currentProduct.images[0])
                + '&productLocation=' + encodeURIComponent(currentProduct.location)
                + '&productDesc=' + encodeURIComponent(currentProduct.shortDesc);
            window.location.href = chatUrl;
        }


        // ============================================
        // INIT
        // ============================================


        document.addEventListener('DOMContentLoaded', function() {
            loadProduct();
        });
    </script>
