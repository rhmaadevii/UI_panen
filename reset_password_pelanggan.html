<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<style>

body{
    font-family:Poppins;
    background:#C8D9A8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:400px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#6B8E3B;
    color:white;
    border:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<input type="password" id="password" placeholder="Password baru">

<input type="password" id="confirm" placeholder="Konfirmasi password">

<button onclick="resetPassword()">Reset Password</button>

</div>

<script>

function resetPassword(){

    const params = new URLSearchParams(window.location.search);

    const token = params.get('token');

    const email = params.get('email');

    const password = document.getElementById('password').value;

    const confirm = document.getElementById('confirm').value;

   fetch('http://127.0.0.1:8000/api/reset-password',{

        method:'POST',

        headers:{
            'Content-Type':'application/json',
            'Accept':'application/json'
        },

        body:JSON.stringify({

            token:token,
            email:email,
            password:password,
            password_confirmation:confirm

        })

    })

    .then(async response=>{

        const data = await response.json();

        if(response.ok){

            alert('Password berhasil direset');

            window.location.href='signin_pelanggan.html';

        }else{

            alert(data.message);

        }

    });

}

</script>

</body>
</html>
