<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanenKu - SignIn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('backgroundsigninup.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .container {
            position: relative;
            z-index: 1;
            background: white;
            padding: 50px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            min-width: 450px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 600;
            color: #2d4a1e;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .btn {
            background-color: #6b9e2b;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            min-width: 140px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #5a8524;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo_panenku.png" alt="PanenKu Logo">
        </div>
        <h1 class="brand-name">PanenKu</h1>
        
        <div class="button-group">
            <a href="signin_pelanggan.html" class="btn">Masuk sebagai<br>Pelanggan</a>
            <a href="signin_petani.html" class="btn">Masuk sebagai<br>Penjual</a>
        </div>
    </div>
</body>
</html>
